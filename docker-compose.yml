services:
  mongodb:
    image: mongo:7
    container_name: customer-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"

  redis:
    image: redis:7
    container_name: customer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: customer-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"